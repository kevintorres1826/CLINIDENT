<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CLINIDENT | Mi Agenda</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="odontologoagenda.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">CLINI<span>DENT</span></div>
        <button class="btn-back" onclick="window.location.href='panel_medico.html'">← Volver al Panel</button>
    </nav>

    <div class="container">
        <div class="header-agenda">
            <h2>📅 Mi Agenda</h2>
            <span class="doc-name">Dr. Alberto Casas</span>
        </div>

        <div class="filtro-bar">
            <label>VER FECHA:</label>
            <input type="date" id="filtro-fecha" onchange="renderAgenda()">
            <button class="btn-hoy" onclick="irHoy()">📅 Hoy</button>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="num" id="stat-total">0</div>
                <div class="lbl">Citas del día</div>
            </div>
            <div class="stat-card">
                <div class="num" id="stat-pendientes">0</div>
                <div class="lbl">Pendientes</div>
            </div>
            <div class="stat-card">
                <div class="num" id="stat-atendidos">0</div>
                <div class="lbl">Atendidos</div>
            </div>
        </div>

        <div id="lista-agenda"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="odontologoagenda.js"></script>
</body>
</html>
